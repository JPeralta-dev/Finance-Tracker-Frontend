<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120B1A"/>
      <stop offset="50%" stop-color="#1D1426"/>
      <stop offset="100%" stop-color="#2A1E35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow -->
  <circle cx="200" cy="100" r="180" fill="url(#glow)"/>
  <circle cx="1000" cy="530" r="240" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#F3E8FF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Logo + Brand -->
  <g transform="translate(80, 80)">
    <rect width="60" height="60" rx="14" fill="url(#accent)"/>
    <path d="M16 30 L26 38 L44 18" stroke="#F3E8FF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="44" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#F3E8FF">Flowr</text>
  </g>

  <!-- Main heading -->
  <text x="80" y="290" font-family="'Space Grotesk', system-ui, sans-serif" font-size="76" font-weight="700" fill="#F3E8FF" letter-spacing="-2">
    Your money,
  </text>
  <text x="80" y="380" font-family="'Space Grotesk', system-ui, sans-serif" font-size="76" font-weight="700" fill="url(#accent)" letter-spacing="-2">
    perfectly organized
  </text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#F3E8FF" fill-opacity="0.75">
    Track, analyze, and optimize your spending — free forever.
  </text>

  <!-- CTA Pill -->
  <g transform="translate(80, 500)">
    <rect width="380" height="68" rx="34" fill="url(#accent)"/>
    <text x="190" y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#120B1A" text-anchor="middle">
      Start your 30-day free trial
    </text>
  </g>

  <!-- Trust line -->
  <g transform="translate(500, 528)">
    <text font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#F3E8FF" fill-opacity="0.6">
      ✓ Free forever    ✓ No credit card    ✓ 256-bit encryption
    </text>
  </g>

  <!-- URL -->
  <text x="80" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#F3E8FF" fill-opacity="0.4" letter-spacing="0.1em">
    FLOWR.FINANCE
  </text>
</svg>
