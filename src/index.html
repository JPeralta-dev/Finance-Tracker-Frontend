<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flowr — Personal Finance Tracker</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Your money, perfectly organized. Track expenses, understand spending patterns, and take control of your finances — free, no credit card required.">

  <!-- Open Graph (overridden at runtime by landing.component.ts) -->
  <meta property="og:title" content="Flowr — Your money, perfectly organized">
  <meta property="og:description" content="Track expenses, understand spending patterns, and take control of your finances. Free forever.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/og/og-image.svg">
  <meta property="og:url" content="https://flowr.finance">

  <!-- Twitter Card (overridden at runtime by landing.component.ts) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Flowr — Your money, perfectly organized">
  <meta name="twitter:description" content="Track expenses, understand spending patterns, and take control of your finances. Free forever.">
  <meta name="twitter:image" content="/assets/og/og-image.svg">

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('flowr_theme');
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Preconnect to backend for faster TLS handshake -->
  <link rel="preconnect" href="https://finance-tracker-backend-production-2573.up.railway.app">
</head>
<body>
  <app-root></app-root>
</body>
</html>
