<div class="app-container">
  <!-- Ambient background -->
  <div class="app-background"></div>

  <!-- Top navigation bar - only show on authenticated private routes -->
  @if (showTopbar()) {
    <ft-topbar />
  }

  <!-- Main content area -->
  <main class="app-main">
    <div [@pageTransition]>
      <router-outlet />
    </div>
  </main>

  <!-- Global overlays -->
  <ft-command-palette />
  <ft-toast-container />
</div>
