<div class="app-container">
  <!-- Ambient background -->
  <div class="app-background"></div>

  <!-- Top navigation bar - only show on authenticated private routes -->
  @if (showTopbar()) {
    <ft-topbar />
  }

  <!-- Main content area -->
  <main class="app-main">
    <router-outlet />
  </main>

  <!-- Global overlays -->
  <ft-command-palette />
  <ft-toast-container />
  <ft-category-modal />
  <ft-consent-banner />
</div>
