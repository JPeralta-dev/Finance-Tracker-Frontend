<div class="stat-card" [class.stat-card--compact]="compact()">
  <!-- Top highlight -->
  <div class="stat-card__glow"></div>

  <!-- Header: icon + label -->
  <div class="stat-card__header">
    @if (data().icon; as iconName) {
      <span class="stat-card__icon">
        <ng-icon [name]="iconName" size="1rem" />
      </span>
    }
    <span class="stat-card__label">{{ data().label }}</span>
  </div>

  <!-- Value with CountUp animation -->
  <div class="stat-card__value">
    <span [ftCountUp]="data().value" [ftCountUpDecimals]="2"></span>
  </div>

  <!-- Footer: trend + optional insight -->
  @if (data().trend !== undefined || data().insight) {
    <div class="stat-card__footer">
      @if (data().trend !== undefined) {
        <span
          class="stat-card__trend"
          [class]="trendDirection() === 'up' ? 'trend--up' : trendDirection() === 'down' ? 'trend--down' : 'trend--neutral'"
        >
          @if (trendDirection() === 'up') {
            <ng-icon name="heroArrowTrendingUp" size="0.85rem" />
          } @else if (trendDirection() === 'down') {
            <ng-icon name="heroArrowTrendingDown" size="0.85rem" />
          }
          {{ trendLabel() }}
        </span>
      }
      @if (data().insight) {
        <span class="stat-card__insight">
          <span class="insight-dot"></span>
          {{ data().insight }}
        </span>
      }
    </div>
  }
</div>
