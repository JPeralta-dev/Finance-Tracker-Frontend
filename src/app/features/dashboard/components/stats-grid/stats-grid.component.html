<div class="stats-grid">
  @if (loading()) {
    @for (i of [1, 2, 3, 4]; track i) {
      <div class="stat-card stat-card--skeleton">
        <div class="stat-card__header">
          <div class="stat-card__icon stat-card__icon--skeleton"></div>
          <div class="stat-card__label stat-card__label--skeleton"></div>
        </div>
        <div class="stat-card__value stat-card__value--skeleton"></div>
        <div class="stat-card__footer--skeleton">
          <div class="stat-card__trend--skeleton"></div>
          <div class="stat-card__insight--skeleton"></div>
        </div>
      </div>
    }
  } @else {
    @for (stat of stats(); track stat.id) {
      <ft-stat-card [data]="stat" [compact]="compact()" />
    }
  }
</div>
