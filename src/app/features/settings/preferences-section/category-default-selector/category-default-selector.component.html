<div class="pref-row" ftSubtleReveal="fade-up" [delay]="delay()">
  <div class="pref-label">
    <ng-icon name="tag" size="1.25rem" />
    <span>{{ 'settings.preferences.default_category' | translate }}</span>
  </div>

  <div class="pref-control">
    @if (loading()) {
      <span class="loading-text">{{ 'common.loading' | translate }}...</span>
    } @else if (error() && expenseCategories.length === 0) {
      <span class="helper-text">{{ error() }}</span>
    } @else {
      <div class="category-select-row">
        <select
          class="category-select"
          [ngModel]="selectedId() ?? ''"
          (ngModelChange)="selectedId.set($event || null); success.set(false); error.set(null)"
          [disabled]="saving()"
        >
          <option value="">{{ 'settings.preferences.select_category' | translate }}</option>
          @for (cat of expenseCategories; track cat.id) {
            <option [value]="cat.id">{{ cat.icon }} {{ cat.name }}</option>
          }
        </select>

        <button
          class="save-btn"
          [class.save-btn--saving]="saving()"
          [disabled]="saving() || !hasChanges"
          (click)="save()"
        >
          @if (saving()) {
            <ng-icon name="loader" size="1rem" class="spin" />
          } @else {
            <ng-icon name="check" size="1rem" />
          }
          <span>{{ 'common.save' | translate }}</span>
        </button>
      </div>

      @if (success()) {
        <span class="success-text">{{ 'settings.preferences.saved' | translate }}</span>
      }
      @if (error()) {
        <span class="helper-text error">{{ error() }}</span>
      }
    }
  </div>
</div>
