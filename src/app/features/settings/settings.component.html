<div class="settings-page" ftSubtleReveal="fade-up">
  <div class="page-header">
    <h1 class="page-title">{{ 'settings.title' | translate }}</h1>
    <p class="page-subtitle">{{ 'settings.subtitle' | translate }}</p>
  </div>

  <!-- Order: Linked Accounts → Security → Preferences → Notifications -->
  <app-linked-accounts-section [delay]="50" />
  <app-security-section [delay]="100" />
  <app-preferences-section [delay]="150" />
  <app-notifications-section [delay]="200" />

  <!-- Session / Account section -->
  <div class="settings-section settings-section--danger" ftSubtleReveal="fade-up" [delay]="300">
    <div class="section-header">
      <div class="section-icon section-icon--danger">
        <ng-icon name="logout" size="1.5rem" />
      </div>
      <div class="section-info">
        <h2 class="section-title">{{ 'settings.session.title' | translate }}</h2>
      </div>
    </div>
    <div class="session-actions">
      <button class="btn-sign-out" (click)="onSignOut()" [disabled]="logoutLoading()">
        @if (logoutLoading()) {
          <span class="spinner-sm"></span>
        }
        {{ 'settings.session.sign_out' | translate }}
      </button>
    </div>
  </div>

  <!-- Back to dashboard -->
  <div class="back-link-wrap">
    <a routerLink="/dashboard" class="back-link">
      <ng-icon name="chevronLeft" size="1rem" />
      {{ 'settings.back_to_dashboard' | translate }}
    </a>
  </div>
</div>
