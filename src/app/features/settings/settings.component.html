<div class="settings-page" ftScrollAnimate="fade-up">
  <div class="page-header">
    <h1 class="page-title">{{ 'settings.title' | translate }}</h1>
    <p class="page-subtitle">{{ 'settings.subtitle' | translate }}</p>
  </div>

  <!-- Placeholder for future integrations -->
  <div class="settings-section" ftScrollAnimate="fade-up" [delay]="100">
    <div class="section-header">
      <div class="section-icon">
        <ng-icon name="settings" size="1.5rem" />
      </div>
      <div class="section-info">
        <h2 class="section-title">{{ 'settings.integrations.title' | translate }}</h2>
        <p class="section-desc">{{ 'settings.integrations.desc' | translate }}</p>
      </div>
    </div>
    <div class="coming-soon">
      <p>{{ 'settings.coming_soon' | translate }}</p>
    </div>
  </div>

  <!-- Back to dashboard -->
  <div class="back-link-wrap">
    <a routerLink="/dashboard" class="back-link">
      <ng-icon name="chevronLeft" size="1rem" />
      {{ 'settings.back_to_dashboard' | translate }}
    </a>
  </div>
</div>
