<div class="settings-section" ftSubtleReveal="fade-up" [delay]="delay()">
  <div class="section-header">
    <div class="section-icon">
      <ng-icon name="user" size="1.5rem" />
    </div>
    <div class="section-info">
      <h2 class="section-title">{{ 'settings.profile.title' | translate }}</h2>
    </div>
  </div>
  <div class="profile-details">
    <div class="profile-field">
      <span class="field-label">{{ 'settings.profile.display_name' | translate }}</span>
      <span class="field-value">{{ displayName() }}</span>
    </div>
    <div class="profile-field">
      <span class="field-label">{{ 'settings.profile.email' | translate }}</span>
      <span class="field-value">{{ email() }}</span>
    </div>
  </div>
</div>
