<div class="settings-section" ftSubtleReveal="fade-up" [delay]="delay()">
  <div class="section-header">
    <div class="section-icon">
      <ng-icon name="shield" size="1.5rem" />
    </div>
    <div class="section-info">
      <h2 class="section-title">{{ 'settings.security.title' | translate }}</h2>
      <p class="section-desc">{{ 'settings.security.desc' | translate }}</p>
    </div>
  </div>
  <div class="coming-soon">
    <p>{{ 'settings.security.coming_soon' | translate }}</p>
  </div>
</div>
