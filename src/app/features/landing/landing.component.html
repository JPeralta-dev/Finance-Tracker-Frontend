<div class="landing">
  <!-- Global Background Art -->
  <ft-landing-background />

  <!-- Scroll Progress Indicator -->
  <div class="scroll-progress" [style.transform]="'scaleX(' + scrollProgress() / 100 + ')'"></div>

  <!-- Public Navbar -->
  <ft-public-navbar />

  <!-- Hero Section -->
  <ft-hero-section />

  <!-- Features Section -->
  <section id="features" class="features section-full" ftSubtleReveal="soft-blur-in" [delay]="100">
    <div class="features__inner">
      <div class="features__header" ftSubtleReveal="per-word-crossfade" [delay]="200">
        <h2 class="features__title">{{ 'landing.features.title' | translate }}</h2>
        <a href="#features" class="features__view-all">
          {{ 'landing.features.view_all' | translate }}
          <ng-icon name="chevronRight" size="0.875rem" />
        </a>
      </div>
      <div class="features__grid">
        @for (feature of features; track feature.title; let i = $index) {
          <ft-feature-card
            [icon]="feature.icon"
            [title]="feature.title | translate"
            [description]="feature.description | translate"
            ftSubtleReveal="fade-up"
            [delay]="300 + (i * 100)"
          />
        }
      </div>
    </div>
  </section>

  <!-- Telegram Section -->
  <section class="telegram-wrapper section-full" ftSubtleReveal="shimmer-sweep" [delay]="100">
    <div class="telegram-wrapper__inner">
      <div class="telegram-wrapper__header" ftSubtleReveal="per-word-crossfade" [delay]="200">
        <h2 class="telegram-wrapper__title">{{ 'landing.telegram.title' | translate }}</h2>
        <a [href]="telegramBotUrl" target="_blank" class="telegram-wrapper__view-all">
          {{ 'landing.telegram.open_bot' | translate }}
          <ng-icon name="telegram" size="0.875rem" />
        </a>
      </div>
      <ft-telegram-section ftSubtleReveal="micro-scale-fade" [delay]="400" />
    </div>
  </section>

  <!-- Pricing Section -->
  <section class="pricing-wrapper section-full" ftSubtleReveal="scale-down-fade" [delay]="100">
    <ft-pricing [tiers]="tiers" />
  </section>

  <!-- Comparison Table -->
  <section class="comparison-wrapper section-full" ftSubtleReveal="soft-blur-in" [delay]="100">
    <ft-comparison-table [rows]="comparisonRows" />
  </section>

  <!-- Testimonials -->
  <section class="testimonials-wrapper section-full" ftSubtleReveal="short-slide-right" [delay]="100">
    <ft-testimonials [items]="testimonials" />
  </section>

  <!-- FAQ -->
  <section class="faq-wrapper section-full" ftSubtleReveal="fade-up" [delay]="100">
    <ft-faq [items]="faqItems" />
  </section>

  <!-- Trust Signals -->
  <section class="trust-wrapper section-full" ftSubtleReveal="micro-scale-fade" [delay]="100">
    <ft-trust-signals [badges]="trustBadges" />
  </section>

  <!-- Final CTA -->
  <section class="final-cta-wrapper section-full" ftSubtleReveal="soft-blur-in" [delay]="100">
    <ft-final-cta />
  </section>

  <!-- Footer -->
  <ft-footer />

  <!-- Back to top -->
  <button
    class="back-to-top"
    [class.back-to-top--visible]="scrollProgress() > 500"
    (click)="scrollToTop()"
    aria-label="Back to top"
  >
    <ng-icon name="chevronRight" size="1.2rem" />
  </button>
</div>
