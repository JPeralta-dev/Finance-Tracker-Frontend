<section class="final-cta">
  <div class="final-cta__inner">
    <h2 class="final-cta__title" ftScrollAnimate="fade-up" [delay]="100">{{ 'landing.cta.title' | translate }}</h2>
    <p class="final-cta__subtitle" ftScrollAnimate="fade-up" [delay]="200">
      {{ 'landing.cta.subtitle' | translate }}
    </p>
    <a routerLink="/register" class="final-cta__btn" ftScrollAnimate="scale-in" [delay]="300">
      {{ 'landing.cta.button' | translate }}
    </a>
  </div>
</section>
