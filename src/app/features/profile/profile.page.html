<div class="profile-page">
  @if (state() === 'loading') {
    <div class="profile-loading"><h1>{{ 'profile.loading' | translate }}</h1></div>
  } @else if (state() === 'error') {
    <div class="profile-error">
      <h1>{{ 'profile.errorTitle' | translate }}</h1>
      <p>{{ 'profile.errorDesc' | translate }}</p>
      <button class="btn btn--primary" (click)="loadUserProfile()">{{ 'profile.retry' | translate }}</button>
    </div>
  } @else {
    <div class="profile-container" ftSubtleReveal="fade-up">
      <app-profile-avatar-card [user]="user()" [initials]="initials()" />
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <app-profile-personal-info [profileForm]="profileForm" [delay]="100" />
        <div class="form-actions">
          <button type="submit" class="btn btn--primary" [disabled]="profileForm.invalid">
            {{ 'profile.save' | translate }}
          </button>
        </div>
      </form>
      <app-profile-insights-card [userStats]="userStats()" [insights]="insights()" [delay]="200" />
      <div class="back-link-wrap">
        <a routerLink="/dashboard" class="back-link">
          <ng-icon name="chevronLeft" size="1rem" />
          {{ 'profile.backToDashboard' | translate }}
        </a>
      </div>
    </div>
  }
</div>
