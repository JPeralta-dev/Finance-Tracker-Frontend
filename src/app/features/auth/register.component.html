<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">{{ 'auth.register' | translate }}</h1>
    <p class="auth-subtitle">{{ 'auth.register_subtitle' | translate }}</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      @if (error) {
        <div class="error-banner">{{ error | translate }}</div>
      }

      <ft-input
        formControlName="email"
        type="email"
        [label]="'auth.email' | translate"
        [placeholder]="'auth.email_placeholder' | translate"
        [error]="email.invalid && email.touched ? 'auth.errors.email_required' : null"
        autocomplete="email"
      />

      <ft-input
        formControlName="displayName"
        type="text"
        [label]="'auth.displayName' | translate"
        [placeholder]="'auth.displayNamePlaceholder' | translate"
        maxlength="50"
      />

      <ft-input
        formControlName="password"
        type="password"
        [label]="'auth.password' | translate"
        [placeholder]="'auth.password_min' | translate"
        [error]="password.invalid && password.touched ? 'auth.errors.password_min' : null"
        autocomplete="new-password"
      />

      <ft-button
        type="submit"
        variant="primary"
        size="md"
        [fullWidth]="true"
        [loading]="loading"
        [disabled]="form.invalid || loading"
      >
        @if (loading) {
          <span class="spinner"></span> {{ 'auth.creating_account' | translate }}
        } @else {
          {{ 'auth.createAccount' | translate }}
        }
      </ft-button>
    </form>

    <p class="auth-footer">
      {{ 'auth.hasAccount' | translate }}
      <a routerLink="/login">{{ 'auth.signIn' | translate }}</a>
    </p>
  </div>
</div>
