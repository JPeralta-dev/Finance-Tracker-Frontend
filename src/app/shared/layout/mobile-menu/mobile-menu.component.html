@if (isOpen()) {
  <div class="mobile-menu-backdrop" (click)="onClose()"></div>
  <div class="mobile-menu-drawer">
    <div class="mobile-menu-header">
      <span class="mobile-menu-logo">Flowr</span>
      <button class="mobile-menu-close" (click)="onClose()" aria-label="Close menu">
        ✕
      </button>
    </div>
    <nav class="mobile-menu-nav">
      @for (item of items(); track item.path) {
        <ft-nav-item
          [label]="item.label"
          [path]="item.path"
          [icon]="item.icon"
          [compact]="true"
          (click)="onClose()"
        />
      }
    </nav>

    <!-- User section + logout -->
    <div class="mobile-menu-user">
      @if (user(); as currentUser) {
        <div class="mobile-menu-user-info">
          <div class="mobile-menu-user-avatar">
            {{ getInitials(currentUser.displayName || currentUser.email) }}
          </div>
          <div class="mobile-menu-user-details">
            <span class="mobile-menu-user-name">{{ currentUser.displayName || ('nav.profile' | translate) }}</span>
            <span class="mobile-menu-user-email">{{ currentUser.email }}</span>
          </div>
        </div>
      }
      <button class="mobile-menu-logout" (click)="onLogout()" [attr.aria-label]="'auth.logout' | translate">
        <ng-icon name="logout" size="1rem" />
        <span>{{ 'auth.logout' | translate }}</span>
      </button>
    </div>
  </div>
}
