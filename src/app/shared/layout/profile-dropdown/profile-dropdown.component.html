<div class="profile-dropdown" (clickOutside)="closeDropdown()">
  <app-profile-dropdown-trigger
    [initials]="initials()"
    [displayName]="displayName()"
    [isOpen]="isOpen()"
    (toggled)="toggleDropdown()"
  />

  @if (isOpen()) {
    <app-profile-dropdown-menu
      [user]="user()"
      [initials]="initials()"
      [displayName]="displayName()"
      [isLoggingOut]="isLoggingOut()"
      (closed)="closeDropdown()"
      (logoutRequested)="onLogout()"
    />
  }
</div>
