<header class="topbar" [class.topbar--scrolled]="isScrolled()">
  <div class="topbar__inner">
    <!-- Left: Logo + Desktop Nav -->
    <div class="topbar__left">
      <a routerLink="/" class="topbar__logo">
        <span class="topbar__logo-icon">
          <ng-icon name="wallet" size="1.2rem" />
        </span>
        <span class="topbar__logo-text">Flowr</span>
      </a>

      <nav class="topbar__nav" aria-label="Main navigation">
        @for (item of navItems; track item.path) {
          <ft-nav-item
            [label]="item.label"
            [path]="item.path"
            [icon]="item.icon"
          />
        }
      </nav>
    </div>

    <!-- Right: Actions + Profile -->
    <div class="topbar__right">
      <button class="topbar__action" aria-label="Notifications">
        <ng-icon name="bell" size="1.1rem" />
        <span class="topbar__badge"></span>
      </button>

      <ft-profile-dropdown />

      <!-- Mobile hamburger -->
      <button
        class="topbar__hamburger"
        aria-label="Open menu"
        (click)="onToggleMenu()"
      >
        <ng-icon name="menu" size="1.2rem" />
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<ft-mobile-menu
  [items]="mobileItems"
  [isOpen]="mobileMenuOpen()"
  (close)="onCloseMenu()"
/>
