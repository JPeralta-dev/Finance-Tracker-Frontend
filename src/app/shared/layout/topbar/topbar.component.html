<header class="topbar" [class.topbar--scrolled]="isScrolled()">
  <div class="topbar__inner">
    <!-- Left: Logo + Desktop Nav -->
    <div class="topbar__left">
      <a routerLink="/" class="topbar__logo">
        <span class="topbar__logo-icon">◆</span>
        <span class="topbar__logo-text">Flowr</span>
      </a>

      <nav class="topbar__nav" aria-label="Main navigation">
        @for (item of navItems; track item.path) {
          <ft-nav-item
            [label]="item.label"
            [path]="item.path"
            [icon]="item.icon"
          />
        }
      </nav>
    </div>

    <!-- Right: Actions + Profile -->
    <div class="topbar__right">
      <button class="topbar__action" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="topbar__badge"></span>
      </button>

      <div class="topbar__profile">
        <div class="topbar__avatar">JP</div>
        <span class="topbar__name">Juan</span>
      </div>

      <!-- Mobile hamburger -->
      <button
        class="topbar__hamburger"
        aria-label="Open menu"
        (click)="onToggleMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<ft-mobile-menu
  [items]="mobileItems"
  [isOpen]="mobileMenuOpen()"
  (close)="onCloseMenu()"
/>
