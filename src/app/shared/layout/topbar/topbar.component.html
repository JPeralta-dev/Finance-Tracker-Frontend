<header class="topbar" [class.topbar--scrolled]="isScrolled()">
  <div class="topbar__inner">
    <!-- Left: Logo + Home Button + Title + Desktop Nav -->
    <div class="topbar__left">
      <a [routerLink]="getLogoLink()" class="topbar__logo">
        <span class="topbar__logo-icon">
          <ng-icon name="wallet" size="1.2rem" />
        </span>
        <span class="topbar__logo-text">Flowr</span>
      </a>

      <!-- Home button: visible only on private routes -->
      @if (showHomeButton()) {
        <button
          class="topbar__home-btn"
          [routerLink]="['/home']"
          aria-label="Go to home"
        >
          <ng-icon name="home" size="1rem" />
        </button>
      }

      <!-- Dynamic page title -->
      @if (pageTitle()) {
        <span class="topbar__title">{{ pageTitle() }}</span>
      }

      <nav class="topbar__nav" aria-label="Main navigation">
        @for (item of navItems; track item.path) {
          <ft-nav-item
            [label]="item.label"
            [path]="item.path"
            [icon]="item.icon"
          />
        }
      </nav>
    </div>

    <!-- Right: Actions + Profile -->
    <div class="topbar__right">
      <ft-notifications-dropdown />

      <ft-profile-dropdown />

      <!-- Mobile hamburger -->
      <button
        class="topbar__hamburger"
        aria-label="Open menu"
        (click)="onToggleMenu()"
      >
        <ng-icon name="menu" size="1.2rem" />
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<ft-mobile-menu
  [items]="mobileItems"
  [isOpen]="mobileMenuOpen()"
  [user]="currentUser()"
  (close)="onCloseMenu()"
/>
