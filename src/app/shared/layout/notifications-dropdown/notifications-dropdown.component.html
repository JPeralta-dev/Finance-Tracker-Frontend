<div class="notifications-dropdown" (clickOutside)="closeDropdown()">
  <button
    class="notifications-dropdown__trigger"
    (click)="toggleDropdown()"
    [attr.aria-expanded]="isOpen()"
    aria-label="Notifications"
  >
    <ng-icon name="bell" size="1.1rem" />
  </button>

  @if (isOpen()) {
    <div class="notifications-dropdown__panel" (click)="onMenuClick($event)">
      <div class="notifications-dropdown__header">
        <h3 class="notifications-dropdown__title">Notifications</h3>
      </div>
      <div class="notifications-dropdown__body">
        <div class="notifications-dropdown__empty">
          <ng-icon name="bell" size="2rem" />
          <p>No notifications yet</p>
        </div>
      </div>
    </div>
  }
</div>
