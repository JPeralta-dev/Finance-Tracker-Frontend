<a
  [routerLink]="path()"
  routerLinkActive="nav-item--active"
  [routerLinkActiveOptions]="{ exact: true }"
  class="nav-item"
  [class.nav-item--compact]="compact()"
>
  <span class="nav-item__icon">
    <ng-icon [name]="icon()" size="1.1rem" />
  </span>
  <span class="nav-item__label">{{ label() | translate }}</span>
</a>
