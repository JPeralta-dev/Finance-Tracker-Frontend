<button
  class="btn"
  [class]="variantClass"
  [class]="sizeClass"
  [class]="fullClass"
  [class]="loadingClass"
  [disabled]="disabled() || loading()"
  [type]="type()"
  (click)="onClick($event)"
>
  @if (loading()) {
    <span class="btn__spinner"></span>
  }
  <span class="btn__content">
    <ng-content />
  </span>
</button>
