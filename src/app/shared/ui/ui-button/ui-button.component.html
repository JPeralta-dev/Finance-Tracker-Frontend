<button
  class="btn"
  [ngClass]="[variantClass, sizeClass, fullClass, loadingClass]"
  [disabled]="disabled() || loading()"
  [type]="type()"
  (click)="onClick($event)"
>
  @if (loading()) {
    <span class="btn__spinner"></span>
  }
  <span class="btn__content">
    <ng-content />
  </span>
</button>
